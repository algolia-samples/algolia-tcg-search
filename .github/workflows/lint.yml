name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tcg-search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tcg-search/package-lock.json
      - run: npm ci
      - run: npm run test:ci

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tcg-search
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tcg-search/package-lock.json
      - run: npm ci
      - run: npm run lint
